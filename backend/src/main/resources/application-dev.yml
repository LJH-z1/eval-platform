spring:
  datasource:
    url: jdbc:h2:mem:eval_dev;MODE=MySQL;DATABASE_TO_LOWER=TRUE;NON_KEYWORDS=user;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:db/migration/V1.0__init-h2.sql
      continue-on-error: false
  data:
    redis:
      host: localhost
      port: 6379

eval:
  jwt:
    secret: dev-jwt-secret-must-be-at-least-32-bytes-long-2026-eval
    expire-hours: 8
  encryption:
    api-key-secret: 0123456789abcdef
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173

logging:
  level:
    com.mavis.evalplatform: INFO
