server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: eval-platform
  profiles:
    # 默认走 prod(真 MySQL);要切回 H2 dev,启动时加 --spring.profiles.active=dev
    active: prod
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:eval_platform}?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000ms
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

eval:
  jwt:
    # 生产环境必须从环境变量注入,且长度≥32字节
    secret: ${JWT_SECRET:MiniMax-eval-platform-secret-key-please-change-in-prod-2026}
    expire-hours: 8
    header: Authorization
    prefix: "Bearer "
  encryption:
    # AES-256 key 必须为 16/24/32 字节
    api-key-secret: ${ENCRYPTION_KEY:0123456789abcdef}
  rate-limit:
    requests-per-minute: 60
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://localhost:5174
      - http://127.0.0.1:5173

logging:
  level:
    root: INFO
    com.mavis.evalplatform: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
