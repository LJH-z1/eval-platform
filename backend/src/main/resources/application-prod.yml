# prod profile - 真 MySQL
spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:eval_platform}?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

eval:
  jwt:
    secret: ${JWT_SECRET:MiniMax-eval-platform-secret-key-please-change-in-prod-2026}
    expire-hours: 8
  encryption:
    api-key-secret: ${ENCRYPTION_KEY:0123456789abcdef}
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
      - http://localhost:8088
      - http://127.0.0.1:8088

logging:
  level:
    com.mavis.evalplatform: INFO
