spring:
  datasource:
    url: jdbc:h2:mem:eval_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql
      data-locations: classpath:data-h2.sql
  data:
    redis:
      host: localhost
      port: 6379

eval:
  jwt:
    secret: test-jwt-secret-must-be-at-least-32-bytes-long-2026
    expire-hours: 8
  encryption:
    api-key-secret: 0123456789abcdef
  cors:
    allowed-origins:
      - http://localhost:5173

logging:
  level:
    com.mavis.evalplatform: INFO
