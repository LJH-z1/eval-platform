# Nginx 反向代理配置(部署时参考)
# 部署到生产时,放置到 /etc/nginx/conf.d/eval-platform.conf

upstream eval_backend {
    server 127.0.0.1:8080;
}

server {
    listen 80;
    server_name eval-platform.local;  # 替换为你的域名

    # 前端静态资源
    root /opt/eval-platform/frontend/dist;
    index index.html;

    # 路由 fallback(SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 后端 API 反代
    location /api/ {
        proxy_pass         http://eval_backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        client_max_body_size 50m;
    }

    # SSE 流式输出需关闭缓冲
    location /api/evaluations/*/stream {
        proxy_pass         http://eval_backend;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_set_header   Connection        "";
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
    }
}
